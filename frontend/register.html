<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-page">
    <div class="auth-top">
        <div class="auth-circle auth-circle-left"></div>
        <div class="auth-circle auth-circle-right"></div>

        <div class="auth-header">
            <h1>Yapılacaklar 🍂</h1>
            <p>Yeni hesap oluştur</p>
        </div>
    </div>

    <div class="auth-card">
        <h2>Register</h2>

        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adı oluştur">
        </div>

        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="Şifre oluştur">
        </div>

        <button class="primary-btn full-btn" onclick="register()">Kayıt Ol</button>

        <p class="auth-switch">
            Zaten hesabın var mı? <a href="login.html">Giriş Yap</a>
        </p>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
